name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Debug - check theme exists
        run: |
          ls node_modules/hexo-theme-a4/package.json && cat node_modules/hexo-theme-a4/package.json | grep version | head -1
          cat _config.yml | grep theme

      - name: Generate static files
        run: npx hexo generate

      - name: Debug - check output
        run: |
          ls -la public/index.html
          wc -c public/index.html
          head -5 public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: ''
