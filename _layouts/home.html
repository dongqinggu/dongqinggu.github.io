---
layout: default
---
<section class="hero">
  <p class="eyebrow">Markdown → A4 Paper</p>
  <h1>把每一篇文章，排成一张适合阅读的 A4 纸。</h1>
  <p>在 GitHub 中新增或编辑 `_posts/*.md`，推送后自动发布。</p>
</section>
<section class="post-grid" aria-label="文章列表">
  {% for post in site.posts %}
    <article class="paper-card">
      <a href="{{ post.url | relative_url }}">
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: '%Y-%m-%d' }}</time>
        <h2>{{ post.title }}</h2>
        <p>{{ post.excerpt | strip_html | normalize_whitespace | truncate: 120 }}</p>
      </a>
    </article>
  {% endfor %}
</section>
