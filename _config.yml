title: Dongqing Gu
subtitle: A4 Paper Blog
description: 个人博客 · 以 A4 纸张风格阅读 Markdown 文章
url: "https://dongqinggu.github.io"
baseurl: ""
lang: zh-CN
timezone: Etc/UTC
markdown: kramdown
permalink: /posts/:year/:month/:day/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
